# inventory/group_vars/all.yml - Shared variables (non-sensitive)

# Docker network
docker_network_name: monitoring

# Prometheus
prometheus_image: prom/prometheus:latest
prometheus_container_name: prometheus
prometheus_port: 9090
prometheus_config_dir: "{{ playbook_dir }}/../config/prometheus"
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 15s

# Node Exporter
node_exporter_image: prom/node-exporter:latest
node_exporter_container_name: node-exporter
node_exporter_port: 9100

# Alertmanager
alertmanager_image: prom/alertmanager:latest
alertmanager_container_name: alertmanager
alertmanager_port: 9093
alertmanager_config_dir: "{{ playbook_dir }}/../config/alertmanager"

# Grafana
grafana_image: grafana/grafana:latest
grafana_container_name: grafana
grafana_port: 3000
grafana_admin_user: admin
grafana_provisioning_dir: "{{ playbook_dir }}/../config/grafana/provisioning"
grafana_dashboards_dir: "{{ playbook_dir }}/../config/grafana/dashboards"

# Scrape targets for Prometheus
prometheus_scrape_targets:
  - job_name: prometheus
    targets:
      - "prometheus:9090"
  - job_name: node-exporter
    targets:
      - "node-exporter:9100"
  - job_name: alertmanager
    targets:
      - "alertmanager:9093"
