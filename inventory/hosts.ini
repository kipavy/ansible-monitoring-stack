# inventory/hosts.ini - Docker containers as managed hosts
[monitoring]
prometheus    ansible_connection=community.docker.docker ansible_docker_extra_args=""
alertmanager  ansible_connection=community.docker.docker ansible_docker_extra_args=""
node-exporter ansible_connection=community.docker.docker ansible_docker_extra_args=""
grafana       ansible_connection=community.docker.docker ansible_docker_extra_args=""

[monitoring:vars]
ansible_python_interpreter=/usr/bin/python3
