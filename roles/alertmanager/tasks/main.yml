# roles/alertmanager/tasks/main.yml - Deploy and configure Alertmanager
---
- name: Create Alertmanager configuration directory
  ansible.builtin.file:
    path: "{{ alertmanager_config_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost

- name: Generate Alertmanager configuration
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_config_dir }}/alertmanager.yml"
    mode: "0644"
  delegate_to: localhost
  notify: Reload Alertmanager

- name: Start Alertmanager container
  community.docker.docker_container:
    name: "{{ alertmanager_container_name }}"
    image: "{{ alertmanager_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ alertmanager_port }}:9093"
    volumes:
      - "{{ alertmanager_config_dir }}/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro"
    networks:
      - name: "{{ docker_network_name }}"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
  delegate_to: localhost
